<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="120" cy="100" r="45" fill="#ec4899" opacity="0.06"/>
  <circle cx="680" cy="360" r="40" fill="#f472b6" opacity="0.06"/>
  <!-- Chat bubble (left) -->
  <rect x="210" y="140" width="140" height="100" rx="16" fill="#ec4899" opacity="0.1" stroke="#ec4899" stroke-width="2.5"/>
  <polygon points="240,240 260,265 270,240" fill="#ec4899" opacity="0.1" stroke="#ec4899" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Chat dots -->
  <circle cx="255" cy="185" r="6" fill="#f472b6" opacity="0.5"/>
  <circle cx="280" cy="185" r="6" fill="#f472b6" opacity="0.4"/>
  <circle cx="305" cy="185" r="6" fill="#f472b6" opacity="0.3"/>
  <!-- VS text -->
  <text x="400" y="205" text-anchor="middle" fill="#ec4899" font-size="24" font-family="Arial, sans-serif" font-weight="bold" opacity="0.5">vs</text>
  <!-- Divider line -->
  <line x1="400" y1="130" x2="400" y2="165" stroke="#ec4899" stroke-width="1.5" opacity="0.2"/>
  <line x1="400" y1="220" x2="400" y2="320" stroke="#ec4899" stroke-width="1.5" opacity="0.2"/>
  <!-- Phone (right) -->
  <rect x="460" y="140" width="80" height="140" rx="12" fill="#ec4899" opacity="0.1" stroke="#ec4899" stroke-width="2.5"/>
  <circle cx="500" cy="256" r="7" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.5"/>
  <line x1="483" y1="160" x2="517" y2="160" stroke="#f472b6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Sound waves from phone -->
  <path d="M550 190 Q560 200 550 215" fill="none" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M560 180 Q575 200 560 225" fill="none" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Connecting dots -->
  <circle cx="370" cy="190" r="3" fill="#ec4899" opacity="0.3"/>
  <circle cx="440" cy="190" r="3" fill="#ec4899" opacity="0.3"/>
  <!-- Bottom decorative line -->
  <line x1="200" y1="380" x2="600" y2="380" stroke="#ec4899" stroke-width="1" opacity="0.15"/>
</svg>