<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="130" cy="380" r="50" fill="#ec4899" opacity="0.06"/>
  <circle cx="670" cy="70" r="40" fill="#f472b6" opacity="0.06"/>
  <!-- Document -->
  <rect x="320" y="100" width="120" height="160" rx="6" fill="#ec4899" opacity="0.08" stroke="#ec4899" stroke-width="2"/>
  <!-- Document lines -->
  <line x1="345" y1="135" x2="415" y2="135" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="345" y1="155" x2="405" y2="155" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="345" y1="175" x2="415" y2="175" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="345" y1="195" x2="390" y2="195" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <!-- Document fold -->
  <path d="M410 100 L440 100 L440 130 L410 130 Z" fill="#1e293b" stroke="#ec4899" stroke-width="1.5" opacity="0.5"/>
  <path d="M410 100 L440 130" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.3"/>
  <!-- Gavel -->
  <rect x="430" y="260" width="70" height="24" rx="5" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="2" transform="rotate(-30 465 272)"/>
  <!-- Gavel handle -->
  <line x1="430" y1="295" x2="395" y2="345" stroke="#ec4899" stroke-width="3" stroke-linecap="round"/>
  <!-- Gavel strike base -->
  <rect x="340" y="340" width="90" height="12" rx="4" fill="#ec4899" opacity="0.12" stroke="#f472b6" stroke-width="1.5"/>
  <!-- Impact lines -->
  <line x1="365" y1="325" x2="355" y2="315" stroke="#f472b6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="385" y1="320" x2="385" y2="308" stroke="#f472b6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="405" y1="325" x2="415" y2="315" stroke="#f472b6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Decorative line -->
  <line x1="200" y1="400" x2="600" y2="400" stroke="#ec4899" stroke-width="1" opacity="0.15"/>
</svg>