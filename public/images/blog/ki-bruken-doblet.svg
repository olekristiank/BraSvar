<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="120" cy="90" r="50" fill="#ec4899" opacity="0.06"/>
  <circle cx="680" cy="370" r="35" fill="#f472b6" opacity="0.07"/>
  <!-- Chart bars -->
  <rect x="240" y="300" width="40" height="50" rx="4" fill="url(#bar)" opacity="0.4"/>
  <rect x="300" y="270" width="40" height="80" rx="4" fill="url(#bar)" opacity="0.5"/>
  <rect x="360" y="240" width="40" height="110" rx="4" fill="url(#bar)" opacity="0.6"/>
  <rect x="420" y="200" width="40" height="150" rx="4" fill="url(#bar)" opacity="0.75"/>
  <rect x="480" y="150" width="40" height="200" rx="4" fill="url(#bar)" opacity="0.9"/>
  <rect x="540" y="100" width="40" height="250" rx="4" fill="url(#bar)"/>
  <!-- Trend line -->
  <polyline points="260,290 320,258 380,225 440,185 500,135 560,85" fill="none" stroke="#f472b6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="560" cy="85" r="5" fill="#f472b6"/>
  <!-- Arrow tip -->
  <polyline points="548,82 560,75 562,90" fill="none" stroke="#f472b6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Base line -->
  <line x1="220" y1="350" x2="600" y2="350" stroke="#ec4899" stroke-width="1.5" opacity="0.3"/>
  <!-- Decorative dots -->
  <circle cx="260" cy="290" r="3" fill="#f472b6" opacity="0.6"/>
  <circle cx="320" cy="258" r="3" fill="#f472b6" opacity="0.6"/>
  <circle cx="380" cy="225" r="3" fill="#f472b6" opacity="0.6"/>
  <circle cx="440" cy="185" r="3" fill="#f472b6" opacity="0.6"/>
  <circle cx="500" cy="135" r="3" fill="#f472b6" opacity="0.6"/>
</svg>