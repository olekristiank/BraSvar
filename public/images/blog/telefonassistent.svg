<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="140" cy="90" r="45" fill="#ec4899" opacity="0.06"/>
  <circle cx="660" cy="370" r="55" fill="#f472b6" opacity="0.05"/>
  <!-- Headset band -->
  <path d="M340 200 Q340 130 400 130 Q460 130 460 200" fill="none" stroke="#ec4899" stroke-width="3" stroke-linecap="round"/>
  <!-- Left ear piece -->
  <rect x="325" y="190" width="25" height="50" rx="10" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="2.5"/>
  <!-- Right ear piece -->
  <rect x="450" y="190" width="25" height="50" rx="10" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="2.5"/>
  <!-- Microphone arm -->
  <path d="M350 230 Q350 280 380 290" fill="none" stroke="#f472b6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Microphone -->
  <circle cx="388" cy="292" r="10" fill="#ec4899" opacity="0.2" stroke="#f472b6" stroke-width="2"/>
  <!-- Sound waves right -->
  <path d="M490 205 Q505 215 490 230" fill="none" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M500 195 Q525 215 500 240" fill="none" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <path d="M510 185 Q545 215 510 250" fill="none" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <!-- Sound waves left -->
  <path d="M310 205 Q295 215 310 230" fill="none" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M300 195 Q275 215 300 240" fill="none" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- AI indicator dots -->
  <circle cx="400" cy="165" r="4" fill="#ec4899" opacity="0.5"/>
  <circle cx="385" cy="158" r="2.5" fill="#f472b6" opacity="0.3"/>
  <circle cx="415" cy="158" r="2.5" fill="#f472b6" opacity="0.3"/>
  <!-- Bottom decorative line -->
  <line x1="200" y1="380" x2="600" y2="380" stroke="#ec4899" stroke-width="1" opacity="0.15"/>
</svg>