<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="40" fill="#ec4899" opacity="0.06"/>
  <circle cx="700" cy="380" r="50" fill="#f472b6" opacity="0.05"/>
  <!-- Person 1 -->
  <circle cx="250" cy="180" r="20" fill="none" stroke="#ec4899" stroke-width="2.5"/>
  <path d="M225 230 Q225 210 250 210 Q275 210 275 230 L275 270 L225 270 Z" fill="#ec4899" opacity="0.12" stroke="#ec4899" stroke-width="2"/>
  <!-- Person 2 -->
  <circle cx="310" cy="190" r="18" fill="none" stroke="#f472b6" stroke-width="2" opacity="0.7"/>
  <path d="M288 235 Q288 218 310 218 Q332 218 332 235 L332 270 L288 270 Z" fill="#f472b6" opacity="0.08" stroke="#f472b6" stroke-width="1.5" opacity="0.7"/>
  <!-- Gap area - dashed outline showing missing person -->
  <circle cx="400" cy="185" r="20" fill="none" stroke="#ec4899" stroke-width="2" stroke-dasharray="5 4" opacity="0.3"/>
  <path d="M375 232 Q375 215 400 215 Q425 215 425 232 L425 270 L375 270 Z" fill="none" stroke="#ec4899" stroke-width="2" stroke-dasharray="5 4" opacity="0.3"/>
  <!-- Question mark in gap -->
  <text x="400" y="195" text-anchor="middle" fill="#ec4899" font-size="22" font-family="Arial, sans-serif" opacity="0.4">?</text>
  <!-- Person 3 -->
  <circle cx="490" cy="185" r="18" fill="none" stroke="#f472b6" stroke-width="2" opacity="0.7"/>
  <path d="M468 232 Q468 215 490 215 Q512 215 512 232 L512 270 L468 270 Z" fill="#f472b6" opacity="0.08" stroke="#f472b6" stroke-width="1.5" opacity="0.7"/>
  <!-- Person 4 -->
  <circle cx="550" cy="180" r="20" fill="none" stroke="#ec4899" stroke-width="2.5"/>
  <path d="M525 230 Q525 210 550 210 Q575 210 575 230 L575 270 L525 270 Z" fill="#ec4899" opacity="0.12" stroke="#ec4899" stroke-width="2"/>
  <!-- Ground line -->
  <line x1="210" y1="290" x2="590" y2="290" stroke="#ec4899" stroke-width="1.5" opacity="0.2"/>
  <!-- Down arrow indicating shortage -->
  <line x1="400" y1="310" x2="400" y2="350" stroke="#ec4899" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <polyline points="390,340 400,355 410,340" fill="none" stroke="#ec4899" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <!-- Bottom decorative line -->
  <line x1="200" y1="390" x2="600" y2="390" stroke="#ec4899" stroke-width="1" opacity="0.15"/>
</svg>