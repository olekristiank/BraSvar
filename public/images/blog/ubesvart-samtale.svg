<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="80" r="40" fill="#ec4899" opacity="0.08"/>
  <circle cx="150" cy="380" r="60" fill="#ec4899" opacity="0.06"/>
  <circle cx="700" cy="350" r="25" fill="#f472b6" opacity="0.07"/>
  <!-- Phone body -->
  <rect x="340" y="120" width="100" height="180" rx="16" fill="none" stroke="#ec4899" stroke-width="3"/>
  <rect x="340" y="120" width="100" height="180" rx="16" fill="#ec4899" opacity="0.08"/>
  <circle cx="390" cy="278" r="8" fill="none" stroke="#f472b6" stroke-width="2"/>
  <line x1="370" y1="138" x2="410" y2="138" stroke="#f472b6" stroke-width="2" stroke-linecap="round"/>
  <!-- Missed call indicator - X mark -->
  <circle cx="420" cy="140" r="22" fill="#ec4899" opacity="0.15"/>
  <circle cx="420" cy="140" r="22" fill="none" stroke="#ec4899" stroke-width="2.5"/>
  <line x1="412" y1="132" x2="428" y2="148" stroke="#ec4899" stroke-width="3" stroke-linecap="round"/>
  <line x1="428" y1="132" x2="412" y2="148" stroke="#ec4899" stroke-width="3" stroke-linecap="round"/>
  <!-- Signal waves (broken/fading) -->
  <path d="M460 170 Q475 160 475 180" fill="none" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.5" stroke-dasharray="4 3"/>
  <path d="M470 155 Q495 145 495 195" fill="none" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.3" stroke-dasharray="4 3"/>
  <!-- Bottom decorative line -->
  <line x1="200" y1="370" x2="600" y2="370" stroke="#ec4899" stroke-width="1" opacity="0.15"/>
  <circle cx="400" cy="370" r="3" fill="#ec4899" opacity="0.3"/>
</svg>