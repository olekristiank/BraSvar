<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="130" cy="370" r="50" fill="#ec4899" opacity="0.06"/>
  <circle cx="670" cy="80" r="35" fill="#f472b6" opacity="0.06"/>
  <!-- Large gear -->
  <g transform="translate(370, 200)">
    <circle r="55" fill="#ec4899" opacity="0.08" stroke="#ec4899" stroke-width="2.5"/>
    <circle r="18" fill="#0f172a" stroke="#ec4899" stroke-width="2"/>
    <!-- Gear teeth -->
    <rect x="-8" y="-68" width="16" height="20" rx="3" fill="#ec4899" opacity="0.2" stroke="#ec4899" stroke-width="1.5"/>
    <rect x="-8" y="48" width="16" height="20" rx="3" fill="#ec4899" opacity="0.2" stroke="#ec4899" stroke-width="1.5"/>
    <rect x="48" y="-8" width="20" height="16" rx="3" fill="#ec4899" opacity="0.2" stroke="#ec4899" stroke-width="1.5"/>
    <rect x="-68" y="-8" width="20" height="16" rx="3" fill="#ec4899" opacity="0.2" stroke="#ec4899" stroke-width="1.5"/>
    <rect x="33" y="-50" width="18" height="16" rx="3" fill="#ec4899" opacity="0.2" stroke="#ec4899" stroke-width="1.5" transform="rotate(45 42 -42)"/>
    <rect x="-51" y="34" width="18" height="16" rx="3" fill="#ec4899" opacity="0.2" stroke="#ec4899" stroke-width="1.5" transform="rotate(45 -42 42)"/>
    <rect x="33" y="34" width="18" height="16" rx="3" fill="#ec4899" opacity="0.2" stroke="#ec4899" stroke-width="1.5" transform="rotate(-45 42 42)"/>
    <rect x="-51" y="-50" width="18" height="16" rx="3" fill="#ec4899" opacity="0.2" stroke="#ec4899" stroke-width="1.5" transform="rotate(-45 -42 -42)"/>
  </g>
  <!-- Small gear -->
  <g transform="translate(480, 290)">
    <circle r="32" fill="#f472b6" opacity="0.06" stroke="#f472b6" stroke-width="2"/>
    <circle r="10" fill="#0f172a" stroke="#f472b6" stroke-width="1.5"/>
    <rect x="-6" y="-42" width="12" height="14" rx="2" fill="#f472b6" opacity="0.15" stroke="#f472b6" stroke-width="1.2"/>
    <rect x="-6" y="28" width="12" height="14" rx="2" fill="#f472b6" opacity="0.15" stroke="#f472b6" stroke-width="1.2"/>
    <rect x="28" y="-6" width="14" height="12" rx="2" fill="#f472b6" opacity="0.15" stroke="#f472b6" stroke-width="1.2"/>
    <rect x="-42" y="-6" width="14" height="12" rx="2" fill="#f472b6" opacity="0.15" stroke="#f472b6" stroke-width="1.2"/>
  </g>
  <!-- Connecting motion lines -->
  <path d="M300 160 Q280 140 280 160" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M290 145 Q265 125 265 150" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <!-- Circular arrow suggesting rotation -->
  <path d="M520 250 Q540 235 535 255" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Bottom decorative line -->
  <line x1="200" y1="390" x2="600" y2="390" stroke="#ec4899" stroke-width="1" opacity="0.15"/>
</svg>