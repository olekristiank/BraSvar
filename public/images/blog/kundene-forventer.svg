  <line x1="380" y1="107" x2="420" y2="107" stroke="#f472b6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="383" y1="118" x2="412" y2="118" stroke="#f472b6" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Person 3 (right) -->
  <circle cx="510" cy="180" r="22" fill="none" stroke="#ec4899" stroke-width="2.5"/>
  <path d="M482 230 Q482 210 510 210 Q538 210 538 230 L538 260 L482 260 Z" fill="#ec4899" opacity="0.1" stroke="#ec4899" stroke-width="2"/>
