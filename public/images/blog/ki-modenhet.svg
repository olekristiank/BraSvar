<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="140" cy="90" r="40" fill="#ec4899" opacity="0.06"/>
  <circle cx="660" cy="370" r="50" fill="#f472b6" opacity="0.05"/>
  <!-- Checklist container -->
  <rect x="290" y="90" width="220" height="280" rx="12" fill="#ec4899" opacity="0.05" stroke="#ec4899" stroke-width="1.5"/>
  <!-- Header line -->
  <line x1="310" y1="125" x2="490" y2="125" stroke="#ec4899" stroke-width="1" opacity="0.2"/>
  <!-- Row 1 - checked -->
  <rect x="315" y="142" width="22" height="22" rx="4" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="2"/>
  <polyline points="320,154 327,161 337,148" fill="none" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="350" y1="153" x2="480" y2="153" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Row 2 - checked -->
  <rect x="315" y="182" width="22" height="22" rx="4" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="2"/>
  <polyline points="320,194 327,201 337,188" fill="none" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="350" y1="193" x2="465" y2="193" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <!-- Row 3 - checked -->
  <rect x="315" y="222" width="22" height="22" rx="4" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="2"/>
  <polyline points="320,234 327,241 337,228" fill="none" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="350" y1="233" x2="475" y2="233" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Row 4 - in progress (partial) -->
  <rect x="315" y="262" width="22" height="22" rx="4" fill="none" stroke="#f472b6" stroke-width="2" opacity="0.5"/>
  <line x1="350" y1="273" x2="455" y2="273" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <!-- Row 5 - empty -->
  <rect x="315" y="302" width="22" height="22" rx="4" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.3"/>
  <line x1="350" y1="313" x2="470" y2="313" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
  <!-- Progress indicator on right -->
  <rect x="530" y="140" width="8" height="190" rx="4" fill="#ec4899" opacity="0.1"/>
  <rect x="530" y="210" width="8" height="120" rx="4" fill="#ec4899" opacity="0.3"/>
  <!-- Progress arrow -->
  <polyline points="528,200 534,190 540,200" fill="none" stroke="#f472b6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Bottom decorative line -->
  <line x1="200" y1="400" x2="600" y2="400" stroke="#ec4899" stroke-width="1" opacity="0.15"/>
</svg>